# 玄鉴 · Xuanjian 推荐 Redis 配置
# 用途：Celery 异步任务队列持久化（broker db0 + result backend db1）
#
# 启用方式（macOS Homebrew）三选一：
#   A. 一键脚本：bash backend/start-redis-with-aof.sh
#   B. 覆盖默认：cp backend/redis.conf $(brew --prefix)/etc/redis.conf && brew services restart redis
#   C. 独立启动：redis-server backend/redis.conf
#
# 验证：redis-cli CONFIG GET appendonly  → 应返回 "yes"

# ── 网络 ──────────────────────────────────────────
bind 127.0.0.1 ::1
protected-mode yes
port 6379
timeout 0
tcp-keepalive 300

# ── RDB 兜底快照（低频）──────────────────────────
save 900 1      # 15 分钟内至少 1 次写
save 300 10     # 5 分钟内至少 10 次写
save 60 10000   # 1 分钟内至少 10000 次写

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# ── AOF（核心 · 断电安全，Celery 队列持久化依赖此配置）──
appendonly yes
appendfilename "appendonly.aof"
# everysec：每秒 fsync 一次，性能 & 持久化平衡；极端情况下最多丢 1 秒任务
# always：每次写都 fsync，最安全但慢
# no：交给 OS 决定，最快但断电可能丢几秒
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ── 内存策略（个人自部署足够）──────────────────
maxmemory 512mb
# allkeys-lru：内存满时淘汰最久未访问的 key（适合 Celery 结果缓存）
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ── 日志 ──────────────────────────────────────
loglevel notice
# logfile 由 Homebrew 默认指向 $(brew --prefix)/var/log/redis.log；留空则 stdout

# ── 慢查询日志 ─────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── 客户端限制 ─────────────────────────────────
# 默认 10000 个连接对个人使用完全够用
# maxclients 10000

# ── 安全（单机开发环境，不启用密码）─────────────
# requirepass your-strong-password-here
